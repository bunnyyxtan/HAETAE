kind = "web"
previewPath = "/"
title = "HAETAE Landing"
version = "1.0.0"
id = "artifacts/landing"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18150

[services.development]
run = "pnpm --filter @workspace/landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/landing", "run", "build" ]
serve = "static"
publicDir = "artifacts/landing/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18150"
BASE_PATH = "/"
